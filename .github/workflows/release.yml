name: 📦 Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            zig_target: x86_64-linux-musl
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            zig_target: aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            zig_target: x86_64-windows-gnu
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            zig_target: aarch64-windows-gnu
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2
        if: matrix.zig_target != ''

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.zig_target && format('zig cc -target {0}', matrix.zig_target) || '' }}
          CXX: ${{ matrix.zig_target && format('zig c++ -target {0}', matrix.zig_target) || '' }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="falcon-${GOOS}-${GOARCH}${EXT}"
          go build -mod=vendor \
            -ldflags "-s -w -X repofalcon/internal/appinfo.Version=${VERSION} -X repofalcon/internal/appinfo.Commit=${COMMIT}" \
            -o "${OUTPUT}" ./cmd/falcon
          if command -v sha256sum &>/dev/null; then
            sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"
          else
            shasum -a 256 "${OUTPUT}" > "${OUTPUT}.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: falcon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            falcon-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256_DARWIN_ARM64="$(awk '{print $1}' artifacts/falcon-darwin-arm64.sha256)"
          SHA256_DARWIN_AMD64="$(awk '{print $1}' artifacts/falcon-darwin-amd64.sha256)"
          SHA256_LINUX_ARM64="$(awk '{print $1}' artifacts/falcon-linux-arm64.sha256)"
          SHA256_LINUX_AMD64="$(awk '{print $1}' artifacts/falcon-linux-amd64.sha256)"
          sed \
            -e "s/\${VERSION}/${VERSION}/g" \
            -e "s/\${SHA256_DARWIN_ARM64}/${SHA256_DARWIN_ARM64}/g" \
            -e "s/\${SHA256_DARWIN_AMD64}/${SHA256_DARWIN_AMD64}/g" \
            -e "s/\${SHA256_LINUX_ARM64}/${SHA256_LINUX_ARM64}/g" \
            -e "s/\${SHA256_LINUX_AMD64}/${SHA256_LINUX_AMD64}/g" \
            Formula/falcon.rb > falcon.rb

      - name: Push to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/SocialGouv/homebrew-repo-falcon.git" tap || {
            mkdir tap && cd tap && git init
            git remote add origin "https://x-access-token:${TAP_TOKEN}@github.com/SocialGouv/homebrew-repo-falcon.git"
          }
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Handle empty repo (no commits yet)
          git rev-parse HEAD >/dev/null 2>&1 || git commit --allow-empty -m "Init tap"
          mkdir -p Formula
          cp ../falcon.rb Formula/falcon.rb
          git add Formula/falcon.rb
          git commit -m "Update falcon to ${{ github.ref_name }}"
          git push -u origin HEAD:main

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Extract npm tag
        id: npm-tag
        run: |
          if [[ "$GITHUB_REF" == *"alpha"* ]]; then
            npm_tag="alpha"
          elif [[ "$GITHUB_REF" == *"beta"* ]]; then
            npm_tag="beta"
          else
            npm_tag="latest"
          fi
          echo "tag=$npm_tag" >> $GITHUB_OUTPUT

      - name: Publish to npm
        working-directory: npm
        env:
          REPO_FALCON_SKIP_INSTALL: "1"
        run: npm publish --tag ${{ steps.npm-tag.outputs.tag }} --provenance --access public
