name: 📦 Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            zig_target: x86_64-linux-musl
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            zig_target: aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            zig_target: x86_64-windows-gnu
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            zig_target: aarch64-windows-gnu
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2
        if: matrix.zig_target != ''

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.zig_target && format('zig cc -target {0}', matrix.zig_target) || '' }}
          CXX: ${{ matrix.zig_target && format('zig c++ -target {0}', matrix.zig_target) || '' }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="falcon-${GOOS}-${GOARCH}${EXT}"
          go build -mod=vendor \
            -ldflags "-s -w -X repofalcon/internal/appinfo.Version=${VERSION} -X repofalcon/internal/appinfo.Commit=${COMMIT}" \
            -o "${OUTPUT}" ./cmd/falcon
          if command -v sha256sum &>/dev/null; then
            sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"
          else
            shasum -a 256 "${OUTPUT}" > "${OUTPUT}.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: falcon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            falcon-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256_DARWIN_ARM64="$(awk '{print $1}' artifacts/falcon-darwin-arm64.sha256)"
          SHA256_DARWIN_AMD64="$(awk '{print $1}' artifacts/falcon-darwin-amd64.sha256)"
          SHA256_LINUX_ARM64="$(awk '{print $1}' artifacts/falcon-linux-arm64.sha256)"
          SHA256_LINUX_AMD64="$(awk '{print $1}' artifacts/falcon-linux-amd64.sha256)"
          sed \
            -e "s/\${VERSION}/${VERSION}/g" \
            -e "s/\${SHA256_DARWIN_ARM64}/${SHA256_DARWIN_ARM64}/g" \
            -e "s/\${SHA256_DARWIN_AMD64}/${SHA256_DARWIN_AMD64}/g" \
            -e "s/\${SHA256_LINUX_ARM64}/${SHA256_LINUX_ARM64}/g" \
            -e "s/\${SHA256_LINUX_AMD64}/${SHA256_LINUX_AMD64}/g" \
            Formula/falcon.rb > falcon.rb

      - name: Push to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: falcon.rb
          destination_repo: SocialGouv/homebrew-repo-falcon
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update falcon to ${{ github.ref_name }}"
