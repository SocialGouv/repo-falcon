name: 🧪 Tests

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt (check)
        shell: bash
        run: |
          set -euo pipefail
          files=$(find . -name '*.go' -not -path './vendor/*' -print)
          if [[ -n "${files}" ]]; then
            unformatted=$(gofmt -l ${files})
            if [[ -n "${unformatted}" ]]; then
              echo "gofmt needed on:"
              echo "${unformatted}"
              exit 1
            fi
          fi

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: Unit tests
        run: go test -mod=vendor ./internal/...

      - name: Integration & E2E tests
        run: go test -mod=vendor -v ./integration/...

      - name: Smoke test (CLI)
        shell: bash
        run: |
          set -euo pipefail
          go build -mod=vendor -o /tmp/falcon ./cmd/falcon

          for fixture in testdata/tinyrepo_go_js testdata/tinyrepo_go_py testdata/tinyrepo_go_java; do
            echo "=== Smoke test: ${fixture} ==="
            out="/tmp/repofalcon-$(basename ${fixture})"
            rm -rf "${out}"
            /tmp/falcon index --repo "${fixture}" --out "${out}"
            /tmp/falcon snapshot --in "${out}" --out "${out}"
            test -f "${out}/metadata.json"
            test -f "${out}/packages.parquet"
            test -f "${out}/symbols.parquet"
            echo "✓ ${fixture} passed"
          done

