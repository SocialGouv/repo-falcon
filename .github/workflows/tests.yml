name: 🧪 Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt (check)
        shell: bash
        run: |
          set -euo pipefail
          files=$(find . -name '*.go' -not -path './vendor/*' -print)
          if [[ -n "${files}" ]]; then
            unformatted=$(gofmt -l ${files})
            if [[ -n "${unformatted}" ]]; then
              echo "gofmt needed on:"
              echo "${unformatted}"
              exit 1
            fi
          fi

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: go test
        run: go test -mod=vendor ./...

      - name: Smoke test (CLI)
        shell: bash
        run: |
          set -euo pipefail
          out=/tmp/repofalcon-artifacts
          rm -rf "${out}"
          go run -mod=vendor ./cmd/falcon index --repo testdata/tinyrepo_go_js --out "${out}"
          go run -mod=vendor ./cmd/falcon snapshot --in "${out}" --out "${out}"
          test -f "${out}/metadata.json"

